name: Sonar Analysis

on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened

  push:
    branches:
      - develop
      - main

env:
  JAVA_VERSION: '21'

jobs:

  sonar:
    name: "QA – Sonar Analysis"
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\").ok' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run tests and Sonar analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SPRING_PROFILES_ACTIVE: test
          SERVER_PORT: "8080"
          MONGO_URI: mongodb://localhost:27017
          MONGODB_DATABASE: matching_test_db
          PROFILE_SERVICE_URL: http://localhost:9999
          PROFILE_SERVICE_PATH: /api/v1/internal
          PROFILE_SERVICE_PUBLIC_PATH: /api/v1
          GEOLOCATION_SERVICE_URL: http://localhost:9999
          GEOLOCATION_SERVICE_PATH: /internal
          INTERNAL_API_KEY: test-key-for-ci
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: "5672"
          RABBITMQ_USERNAME: guest
          RABBITMQ_PASSWORD: guest
          RABBITMQ_VHOST: "/"
          RABBITMQ_SSL_ENABLED: "false"
        run: |
          mvn clean verify sonar:sonar -B \
            -Dsonar.organization=cybersapienseci \
            -Dsonar.projectKey=cybersapienseci_matching-service \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
