name: CI – Matching Service

on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened

  push:
    branches:
      - develop

env:
  JAVA_VERSION: '21'

jobs:

  # =========================================================
  # CI – BUILD, TEST & COVERAGE
  # =========================================================
  build-and-test:
    name: "CI – Build & Test"
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\").ok' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: test
          SERVER_PORT: "8080"
          MONGO_URI: mongodb://localhost:27017
          MONGODB_DATABASE: matching_test_db
          PROFILE_SERVICE_URL: http://localhost:9999
          PROFILE_SERVICE_PATH: /api/v1/internal
          PROFILE_SERVICE_PUBLIC_PATH: /api/v1
          GEOLOCATION_SERVICE_URL: http://localhost:9999
          GEOLOCATION_SERVICE_PATH: /internal
          INTERNAL_API_KEY: test-key-for-ci
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: "5672"
          RABBITMQ_USERNAME: guest
          RABBITMQ_PASSWORD: guest
          RABBITMQ_VHOST: "/"
          RABBITMQ_SSL_ENABLED: "false"
        run: mvn clean verify -B

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 14

  # =========================================================
  # DOCKER VALIDATION
  # =========================================================
  docker-build:
    name: "Docker – Build Validation"
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t matching-service:ci .
