name: CD – Deploy to Prod

on:
  workflow_run:
    workflows: ["CD – Deploy to QA"]
    branches: [main]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cybersapienseci/matching-service
  RESOURCE_GROUP: alphaECI-prod

jobs:

  deploy-prod:
    name: "Deploy to Prod"
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Prod Container App
        run: |
          az containerapp update \
            --name alphaeci-matching-service-prod \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}

      - name: Health check Prod
        run: |
          PROD_URL=$(az containerapp show \
            --name alphaeci-matching-service-prod \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Prod URL: https://$PROD_URL"
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$PROD_URL/actuator/health")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then exit 0; fi
            sleep 15
          done
          echo "Prod health check failed" && exit 1
