name: CD – Deploy to Prod

on:
  workflow_run:
    workflows: ["CD – Deploy to QA"]
    branches: [main]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cybersapienseci/matching-service
  RESOURCE_GROUP: alphaECI-prod

jobs:

  deploy-prod:
    name: "Deploy to Prod"
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Prod Container App
        run: |
          az containerapp update \
            --name alphaeci-matching-service-prod \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}

      - name: Health check Prod
        run: |
          sleep 30
          STATUS=$(az containerapp show \
            --name alphaeci-matching-service-prod \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.runningStatus" -o tsv)
          echo "Prod status: $STATUS"
          if [ "$STATUS" != "Running" ]; then
            echo "Prod health check failed"
            exit 1
          fi
