services:

  social-matching-service:
    build:
      context: .

    container_name: social-matching-service

    ports:
      - "8080:8080"

    env_file:
      - .env

    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - PROFILE_SERVICE_URL=${PROFILE_SERVICE_URL}
      - PROFILE_SERVICE_PATH=${PROFILE_SERVICE_PATH}
      - PROFILE_SERVICE_PUBLIC_PATH=${PROFILE_SERVICE_PUBLIC_PATH}
      - GEOLOCATION_SERVICE_URL=${GEOLOCATION_SERVICE_URL}
      - GEOLOCATION_SERVICE_PATH=${GEOLOCATION_SERVICE_PATH}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST}
      - RABBITMQ_SSL_ENABLED=${RABBITMQ_SSL_ENABLED}

    networks:
      - backend

    restart: always

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend:
    driver: bridge